---
name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    branches:
      - master

jobs:
  build-and-publish-testpypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pypi-tea
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Install UV
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7

      - name: Generate SBOM (PEP 770)
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_STAGE_TOKEN }}
          API_BASE_URL: 'https://stage.sbomify.com'
          COMPONENT_ID: 'GqOHskUyBcUR'
          COMPONENT_NAME: 'pypi-tea'
          LOCK_FILE: uv.lock
          SBOM_FORMAT: cyclonedx
          OUTPUT_FILE: pypi-tea.cdx.json
          AUGMENT: "true"
          ENRICH: "true"
          UPLOAD: "true"

      - name: Attest SBOM
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: '${{ github.workspace }}/pypi-tea.cdx.json'

      - name: Determine version
        id: version
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          BASE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          SHORT_SHA=$(echo "${GH_SHA}" | cut -c1-7)
          DEV_NUM=$(printf "%d" "0x${SHORT_SHA}" 2>/dev/null | cut -c1-9)
          VERSION="${BASE_VERSION}.dev${DEV_NUM}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Update version in pyproject.toml
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Build wheel
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  build-and-publish-pypi:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/pypi-tea
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Install UV
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7

      - name: Generate SBOM (PEP 770)
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: 'e0O7yCDijhp7'
          COMPONENT_NAME: 'pypi-tea'
          LOCK_FILE: uv.lock
          SBOM_FORMAT: cyclonedx
          OUTPUT_FILE: pypi-tea.cdx.json
          AUGMENT: "true"
          ENRICH: "true"
          UPLOAD: "true"

      - name: Attest SBOM
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: '${{ github.workspace }}/pypi-tea.cdx.json'

      - name: Build wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
